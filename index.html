<!DOCTYPE html>
<html lang="de" data-theme="dark" data-accent="orange">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Analytics 4 (gtag.js) is loaded only after explicit opt-in via
         the cookie-consent banner, and only on the production domain. See
         src/lib/consent.ts (loadGA) + src/components/CookieConsent. -->

    <!-- Primary SEO -->
    <meta name="author" content="André Kipphard" />
    <meta name="theme-color" content="#111110" />

    <!-- Canonical and Open Graph / Twitter tags are emitted per route by
         @unhead/vue (src/pages/*.vue); nothing SEO-related is hardcoded here.
         The site is single-URL German (EN is an in-browser UI toggle), so it
         intentionally ships no per-language alternates. -->

    <!-- Favicons & manifest -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Structured data -->
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Person",
      "@id": "https://kipphard.com/#person",
      "name": "André Kipphard",
      "url": "https://kipphard.com/",
      "email": "mailto:andre@kipphard.com",
      "jobTitle": "Frontend Engineer & Web Developer",
      "address": { "@type": "PostalAddress", "addressLocality": "Paderborn", "addressCountry": "DE" },
      "knowsAbout": ["Frontend Development", "Vue.js", "React", "TypeScript", "E-Commerce", "SEO", "Web Performance", "Accessibility"],
      "sameAs": ["https://github.com/kipphard", "https://de.linkedin.com/in/andr%C3%A9-kipphard-2653991b3"]
    },
    {
      "@type": "WebSite",
      "@id": "https://kipphard.com/#website",
      "url": "https://kipphard.com/",
      "name": "André Kipphard",
      "publisher": { "@id": "https://kipphard.com/#person" },
      "inLanguage": ["de", "en"]
    },
    {
      "@type": "ProfessionalService",
      "name": "André Kipphard — Web Development",
      "url": "https://kipphard.com/",
      "areaServed": "DE",
      "founder": { "@id": "https://kipphard.com/#person" }
    }
  ]
}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
